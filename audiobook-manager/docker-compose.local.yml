services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: audiobook-manager-backend
    ports:
      - "8000:8000"
    volumes:
      - ./data/watch:/app/watch
      - ./data/output:/app/output
      - ./data/config:/config
      - /mnt/plex-media:/mnt/media
    environment:
      - PYTHONUNBUFFERED=1
      - ALLOWED_ORIGINS=http://localhost:80,http://localhost:5173
      - CONFIG_PATH=/config/config.json
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: audiobook-manager-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped